{% extends "base.html" %}
{% block title %}Sign Up — WatchNext{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <span class="logo-play">▶</span>
      <span class="logo-text">WatchNext</span>
    </div>

    <h1 class="auth-title">Create account</h1>
    <p class="auth-sub">Join WatchNext and get personalised picks</p>

    <form method="POST" action="{{ url_for('user_register') }}" class="auth-form">

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username"
               placeholder="Choose a username"
               autocomplete="username" required minlength="3">
        <span class="form-hint">At least 3 characters, no spaces</span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" name="password"
                 placeholder="At least 6 characters"
                 autocomplete="new-password" required minlength="6">
          <button type="button" class="eye-btn" onclick="togglePw('password',this)">👁</button>
        </div>
      </div>

      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <div class="pw-wrap">
          <input type="password" id="confirm" name="confirm"
                 placeholder="Repeat your password"
                 autocomplete="new-password" required>
          <button type="button" class="eye-btn" onclick="togglePw('confirm',this)">👁</button>
        </div>
        <span class="form-hint" id="matchHint"></span>
      </div>

      <button type="submit" class="btn-auth">Create Account</button>
    </form>

    <p class="auth-switch">
      Already have an account? <a href="{{ url_for('user_login') }}">Log in</a>
    </p>
    <p class="auth-switch" style="margin-top:.5rem">
      <a href="{{ url_for('index') }}">← Browse without login</a>
    </p>

  </div>
</div>
<script>
function togglePw(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

// Live password match check
const pw  = document.getElementById('password');
const cf  = document.getElementById('confirm');
const hint = document.getElementById('matchHint');
function checkMatch() {
  if (!cf.value) { hint.textContent = ''; return; }
  if (pw.value === cf.value) {
    hint.textContent = '✓ Passwords match';
    hint.style.color = '#16a34a';
  } else {
    hint.textContent = '✗ Passwords do not match';
    hint.style.color = '#e63946';
  }
}
pw.addEventListener('input', checkMatch);
cf.addEventListener('input', checkMatch);
</script>
{% endblock %}
