{% extends "base.html" %}
{% block title %}Login — WatchNext{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <span class="logo-play">▶</span>
      <span class="logo-text">WatchNext</span>
    </div>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Log in to see your personalised picks</p>

    <form method="POST" action="{{ url_for('user_login') }}" class="auth-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username"
               placeholder="Enter your username"
               autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" name="password"
                 placeholder="Enter your password"
                 autocomplete="current-password" required>
          <button type="button" class="eye-btn" onclick="togglePw('password', this)">👁</button>
        </div>
      </div>
      <button type="submit" class="btn-auth">Log In</button>
    </form>

    <p class="auth-switch">
      Don't have an account?
      <a href="{{ url_for('user_register') }}">Sign up free</a>
    </p>

    <div class="auth-divider"><span>or</span></div>
    <p class="auth-switch">
      <a href="{{ url_for('index') }}">← Continue browsing without login</a>
    </p>

  </div>
</div>

<script>
function togglePw(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}
</script>
{% endblock %}
